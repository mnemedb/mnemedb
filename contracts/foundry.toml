[profile.default]
src = "src"
out = "out"
test = "test"
script = "script"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

[rpc_endpoints]
base         = "${BASE_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

[etherscan]
base         = { key = "${BASESCAN_API_KEY}", chain = 8453  }
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = 84532 }
